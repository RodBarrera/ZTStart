name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy ztstart

      - name: Tests (pytest)
        run: pytest

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar ansible y ansible-lint
        run: pip install ansible ansible-lint

      - name: Lint de los roles Ansible
        run: ansible-lint ztstart/ansible_roles

      - name: Verificación de sintaxis del playbook
        run: |
          cd ztstart/ansible_roles
          ansible-playbook playbook.yml --syntax-check
