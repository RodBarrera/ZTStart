---
# Playbook de ejemplo: aplica zt_baseline al host local.
#
# Uso manual (antes de que rules_engine/ lo invoque automáticamente):
#   ansible-galaxy collection install -r requirements.yml
#   ansible-playbook playbook.yml --ask-become-pass
#
# Para probar sin aplicar cambios reales:
#   ansible-playbook playbook.yml --check --diff

- name: Aplicar baseline zero-trust (perfil pyme-basico)
  hosts: localhost
  connection: local
  become: true
  roles:
    - zt_baseline
